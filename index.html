<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>感官偏好評估測驗 - 香港催眠訓練學院</title>
    <style>
        /* 繼承之前的冰山藍風格並加入進度條樣式 */
        :root { --primary-blue: #1a508b; --iceberg-blue: #f0f7ff; --deep-blue: #0d3b66; }
        body { font-family: 'PingFang HK', sans-serif; background: #fdfdfd; padding: 40px 15px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.08); }
        .progress-container { position: sticky; top: 0; background: white; padding: 10px 0; z-index: 100; border-bottom: 1px solid #eee; margin-bottom: 20px; }
        .progress-bar { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary-blue); width: 0%; transition: 0.3s; }
        .question-card { padding: 30px; margin-bottom: 30px; border-radius: 18px; border: 1px solid #f0f0f0; scroll-margin-top: 100px; }
        .option-label { display: flex; align-items: center; padding: 15px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .option-label:hover { background: var(--iceberg-blue); }
        .submit-btn { width: 100%; padding: 20px; background: var(--deep-blue); color: white; border: none; border-radius: 15px; font-size: 1.2em; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div class="header" style="text-align:center">
        <h2>香港催眠訓練學院</h2>
        <h1>感官偏好評估測驗</h1>
    </div>

    <div class="progress-container">
        <div id="progressText" style="font-size: 12px; margin-bottom: 5px;">測驗進度: 0%</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <form id="assessmentForm">
        <div id="questions"></div>
        <button type="button" class="submit-btn" onclick="calculate()">生成評估報告</button>
    </form>

    <div id="resultArea" style="display:none; text-align:center; margin-top:50px;">
        <canvas id="vakoChart" width="400" height="400"></canvas>
        <div id="analysisText" style="padding:20px; border-radius:15px; background:#f9f9f9;"></div>
    </div>
</div>

<script>
    // 使用之前的深度題目... (此處省略部分重複邏輯以節省空間)
    const deepQuestions = [
        { q: "當您在潛意識探索中進入一個「安全屋」時，您最先建立的細節是：", options: ["房間的採光、顏色與空間結構", "環境中細微的寧靜感或遠處的和弦聲", "身體放鬆的感覺或當地的氣溫", "空氣中飄散著令您懷念的木質香氣"], codes: ['A','B','C','D'] },
        // ... 其他 5 條循環題目
    ];

    const questions = [];
    for(let i=0; i<30; i++) questions.push({...deepQuestions[i % 5]});

    const qContainer = document.getElementById('questions');
    questions.forEach((item, idx) => {
        qContainer.innerHTML += `
            <div class="question-card" id="card_${idx}">
                <div style="color:#c5a059; font-weight:bold;">Q${idx+1}</div>
                <div style="font-weight:bold; margin-bottom:15px;">${item.q}</div>
                ${item.options.map((opt, i) => `
                    <label class="option-label">
                        <input type="radio" name="q${idx}" value="${item.codes[i]}" onclick="autoNext(${idx})">
                        <span style="margin-left:10px;">${item.codes[i]}. ${opt}</span>
                    </label>
                `).join('')}
            </div>
        `;
    });

    function autoNext(idx) {
        // 更新進度條
        const checked = document.querySelectorAll('input:checked').length;
        const percent = Math.round((checked / 30) * 100);
        document.getElementById('progressFill').style.width = percent + "%";
        document.getElementById('progressText').innerText = `測驗進度: ${percent}%`;

        // 自動捲動到下一題
        const nextCard = document.getElementById('card_' + (idx + 1));
        if(nextCard) {
            setTimeout(() => {
                nextCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 300);
        }
    }

    function calculate() {
        // ... (保持原本的計算邏輯)
        alert("計算中...請查看下方圖表");
        // 此處調用原本的繪圖邏輯即可
    }
</script>
</body>
</html>
